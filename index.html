<script>
    // ============================
    // Navigation sécurisée
    // ============================
    function goToShift(shift) {
        const allowed = ["night"]; // shifts disponibles aujourd'hui

        if (!allowed.includes(shift)) {
            alert("⚠️ Ce shift n'est pas encore disponible.");
            return;
        }

        window.location.href = `staffing_${shift}.html`;
    }

    function goToSkillMatrix(shift) {
        const allowed = ["night"]; // skill matrix disponibles aujourd'hui

        if (!allowed.includes(shift)) {
            alert("⚠️ La Skill Matrix de ce shift n'est pas encore disponible.");
            return;
        }

        window.location.href = `skill_matrix_${shift}.html`;
    }

    // ============================
    // Animation d'apparition
    // ============================
    document.addEventListener('DOMContentLoaded', function() {
        const cards = document.querySelectorAll('.shift-card');
        cards.forEach((card, index) => {
            card.style.opacity = '0';
            card.style.transform = 'translateY(30px)';
            card.style.transition = 'all 0.5s ease';

            setTimeout(() => {
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, index * 120);
        });
    });
</script>
